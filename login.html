<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Phantom Boosting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="glass w-full max-w-md p-8 rounded-2xl shadow-2xl">
        <h2 class="text-3xl font-bold text-center mb-2 text-cyan-400">Welcome Back</h2>
        <p class="text-gray-400 text-center mb-8 text-sm">Log in to your Phantom account</p>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Email Address</label>
                <input type="email" id="email" required class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-cyan-500 outline-none transition">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Password</label>
                <input type="password" id="password" required class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-cyan-500 outline-none transition">
            </div>

            <button type="submit" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-3 rounded-lg transition transform active:scale-95 shadow-lg shadow-cyan-900/20">
                Log In
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-gray-400">
            Don't have an account? <a href="register.html" class="text-cyan-400 hover:underline">Sign up</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // PASTE YOUR WHATSAPP KEYS BELOW
      
<script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyB4D33tTSZgsLSOvyBBkZttjn9iW_7PGGs",
    authDomain: "phantom-boosting.firebaseapp.com",
    projectId: "phantom-boosting",
    storageBucket: "phantom-boosting.firebasestorage.app",
    messagingSenderId: "954894417214",
    appId: "1:954894417214:web:e9b13f5f2f889b4578006f"
  };

  // Initialize Firebase

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const loginForm = document.getElementById('loginForm');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                // Try to log the user in
                await signInWithEmailAndPassword(auth, email, password);
                
                // If it works, send them to the dashboard!
                window.location.href = "dashboard.html"; 

            } catch (error) {
                console.error(error);
                // If it fails, tell them why
                alert("Login Failed: Please check your email and password.");
            }
        });
    </script>
</body>
</html>
