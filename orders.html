<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order History | PHANTOM BOOSTING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #e0f2fe;       
            --card-white: #ffffff;     
            --primary-blue: #0ea5e9;   
            --dark-blue: #0369a1;      
            --text-main: #334155;      
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); margin: 0; color: var(--text-main); }
        .container { padding: 15px; min-height: 70vh; }

        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 0 20px 0; color: var(--dark-blue); }
        .nav-left { display: flex; align-items: center; gap: 15px; font-size: 1.1rem; font-weight: bold; }
        .menu-btn { font-size: 1.6rem; cursor: pointer; color: var(--dark-blue); }
        .nav-balance { background: var(--card-white); padding: 6px 15px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; box-shadow: 0 2px 5px rgba(0,0,0,0.05); color: var(--primary-blue); }

        .sidebar-menu { position: fixed; top: 0; left: -300px; width: 260px; height: 100vh; background: var(--card-white); box-shadow: 4px 0 15px rgba(0,0,0,0.1); z-index: 1000; transition: 0.3s ease-in-out; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; }
        .sidebar-menu.active { left: 0; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; }
        .sidebar-header h2 { margin: 0; color: var(--dark-blue); font-weight: 900; letter-spacing: 1px; }
        .close-btn { font-size: 1.5rem; cursor: pointer; color: #ef4444; }
        .sidebar-menu a { display: flex; align-items: center; padding: 15px; color: var(--text-main); text-decoration: none; font-weight: bold; border-radius: 10px; margin-bottom: 10px; transition: 0.2s; }
        .sidebar-menu a i { width: 30px; font-size: 1.2rem; color: var(--primary-blue); }
        .sidebar-menu a:hover { background: var(--bg-color); color: var(--dark-blue); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; display: none; }
        .overlay.active { display: block; }

        .page-title { text-align: center; color: var(--dark-blue); margin-bottom: 20px; }
        
        .history-card { background: var(--card-white); border-radius: 20px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); overflow-x: auto; }
        
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { text-align: left; padding: 15px; border-bottom: 1px solid #e2e8f0; font-size: 0.95rem; }
        th { background-color: #f8fafc; color: #64748b; font-weight: 600; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 0.5px; }
        tr:hover { background-color: #f8fafc; }
        
        .status-badge { padding: 5px 10px; border-radius: 8px; font-size: 0.85rem; font-weight: bold; color: white; display: inline-block; text-align: center; min-width: 80px; text-transform: capitalize; transition: 0.3s; }

        .mega-footer { background: var(--dark-blue); color: white; padding: 40px 20px 80px 20px; border-radius: 35px 35px 0 0; text-align: center; margin-top: 40px; }
        .mega-footer h1 { color: #38bdf8; font-size: 2.5rem; margin: 0 0 10px 0; font-weight: 900; letter-spacing: 2px; }
        .mega-footer p.tagline { color: #bae6fd; font-size: 0.95rem; margin-bottom: 25px; line-height: 1.5; }
        .social-circles { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .social-circles a { background: rgba(255,255,255,0.15); color: white; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="overlay" id="menuOverlay" onclick="closeMenu()"></div>

    <div class="sidebar-menu" id="sideMenu">
        <div class="sidebar-header">
            <h2>FACO</h2>
            <i class="fa-solid fa-xmark close-btn" onclick="closeMenu()"></i>
        </div>
        <a href="dashboard.html"><i class="fa-solid fa-house"></i> Dashboard</a>
        <a href="add-funds.html"><i class="fa-solid fa-wallet"></i> Add Funds</a>
        <a href="orders.html" style="background: var(--bg-color); color: var(--dark-blue);"><i class="fa-solid fa-list-check"></i> Order History</a>
        <div style="flex-grow: 1;"></div>
        <hr style="border: 0; border-top: 1px solid #e2e8f0; width: 100%; margin: 10px 0;">
        <a href="#" id="logoutBtn" style="color: #ef4444; margin-bottom: 5px;"><i class="fa-solid fa-right-from-bracket" style="color: #ef4444;"></i> Log Out</a>
    </div>

    <div class="container">
        <div class="top-nav">
            <div class="nav-left">
                <i class="fa-solid fa-bars menu-btn" onclick="openMenu()"></i>
                <span>Your Orders</span>
            </div>
            <div class="nav-balance" id="navBalance">Loading...</div>
        </div>

        <h2 class="page-title">Order History</h2>

        <div class="history-card">
            <table>
                <thead>
                    <tr>
                        <th>Receipt ID</th>
                        <th>Service Details</th>
                        <th>Link</th>
                        <th>Live Status</th>
                    </tr>
                </thead>
                <tbody id="userOrdersBody">
                    <tr><td colspan="4" style="text-align: center; padding: 30px; color: #64748b;"><i class="fa-solid fa-spinner fa-spin"></i> Fetching your orders...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="mega-footer">
        <h1>FACO</h1>
        <p class="tagline">PHANTOM BOOSTING is the Best destination for premium social media marketing services.</p>
        <div class="social-circles">
            <a href="#"><i class="fa-brands fa-whatsapp"></i></a>
            <a href="#"><i class="fa-brands fa-telegram"></i></a>
        </div>
    </div>

    <script>
        function openMenu() { document.getElementById("sideMenu").classList.add("active"); document.getElementById("menuOverlay").classList.add("active"); }
        function closeMenu() { document.getElementById("sideMenu").classList.remove("active"); document.getElementById("menuOverlay").classList.remove("active"); }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { initializeFirestore, doc, getDoc, updateDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB4D33tTSZgsLSOvyBBkZttjn9iW_7PGGs",
            authDomain: "phantom-boosting.firebaseapp.com",
            projectId: "phantom-boosting",
            storageBucket: "phantom-boosting.firebasestorage.app",
            messagingSenderId: "954894417214",
            appId: "1:954894417214:web:e9b13f5f2f889b4578006f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = initializeFirestore(app, { experimentalForceLongPolling: true });

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "login.html";
            } else {
                try {
                    const docRef = doc(db, "users", user.uid);
                    const docSnap = await getDoc(docRef);
                    if (docSnap.exists()) {
                        document.getElementById('navBalance').innerText = "₹ " + (docSnap.data().balance || 0).toFixed(2);
                    }
                } catch (e) { console.error(e); }

                fetchMyOrders(user.uid);
            }
        });

        // Color coding function for statuses
        const getStatusColor = (status) => {
            if (!status) return "#eab308";
            const s = status.toLowerCase();
            if(s === "processing" || s === "in progress") return "#3b82f6";
            if(s === "completed") return "#22c55e";
            if(s === "canceled" || s === "partial") return "#ef4444";
            return "#eab308"; // Pending fallback
        };

        async function fetchMyOrders(uid) {
            const tbody = document.getElementById("userOrdersBody");
            try {
                const q = query(collection(db, "orders"), where("uid", "==", uid));
                const querySnapshot = await getDocs(q);
                
                let myOrders = [];
                querySnapshot.forEach((docSnap) => {
                    myOrders.push({ id: docSnap.id, ...docSnap.data() });
                });

                myOrders.sort((a, b) => b.createdAt - a.createdAt);
                tbody.innerHTML = ""; 

                if (myOrders.length === 0) {
                    tbody.innerHTML = "<tr><td colspan='4' style='text-align: center; color: #64748b;'>You haven't placed any orders yet.</td></tr>";
                    return;
                }

                myOrders.forEach((data) => {
                    const shortId = data.id.substring(0, 8).toUpperCase();
                    let currentStatus = data.status || "Pending";
                    let statusColor = getStatusColor(currentStatus);

                    // Note: We show the secret provider ID in tiny gray text just in case you ever need to manually verify an order!
                    const tr = document.createElement("tr");
                    tr.innerHTML = `
                        <td><strong>${shortId}</strong><br><small style="color: #cbd5e1; font-size: 0.7rem;">API #${data.providerOrderId || 'N/A'}</small></td>
                        <td>
                            <div style="font-weight: bold; color: var(--dark-blue); font-size: 0.9rem;">${data.serviceName}</div>
                            <div style="font-size: 0.8rem; color: #64748b;">Qty: ${data.quantity} | Charge: ₹${data.charge}</div>
                        </td>
                        <td><a href="${data.link}" target="_blank" style="color: var(--primary-blue); text-decoration: none; font-size: 0.85rem;">View Link</a></td>
                        <td><span id="badge-${data.id}" class="status-badge" style="background:${statusColor};">${currentStatus}</span></td>
                    `;
                    tbody.appendChild(tr);

                    // THE AUTO-STATUS CHECKER
                    // If the order isn't fully completed or canceled, ask the provider API for a live update!
                    if (data.providerOrderId && !['completed', 'canceled', 'partial'].includes(currentStatus.toLowerCase())) {
                        fetch(`/api/status?order=${data.providerOrderId}`)
                            .then(res => res.json())
                            .then(async (apiResult) => {
                                if (apiResult && apiResult.status && apiResult.status !== currentStatus) {
                                    
                                    // 1. Update the color badge live on the screen
                                    const badge = document.getElementById(`badge-${data.id}`);
                                    if (badge) {
                                        badge.innerText = apiResult.status;
                                        badge.style.background = getStatusColor(apiResult.status);
                                    }
                                    
                                    // 2. Save the new status back to Firebase so it remembers it for next time
                                    const orderRef = doc(db, "orders", data.id);
                                    await updateDoc(orderRef, { status: apiResult.status });
                                }
                            })
                            .catch(err => console.error("Status check failed:", err));
                    }
                });

            } catch (error) {
                tbody.innerHTML = `<tr><td colspan='4' style='color: red; text-align: center;'>Error loading orders. Refresh the page.</td></tr>`;
                console.error(error);
            }
        }

        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            await signOut(auth);
            window.location.href = "login.html";
        });
    </script>
</body>
</html>
