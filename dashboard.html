<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard | Phantom Boosting</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; display: flex; }
        .sidebar { width: 250px; background-color: #1e293b; height: 100vh; padding: 20px; }
        .sidebar h2 { color: #38bdf8; }
        .sidebar a { color: #94a3b8; text-decoration: none; display: block; padding: 12px 0; border-bottom: 1px solid #334155; }
        .main-content { flex-grow: 1; padding: 40px; }
        .balance-card { background-color: #1e293b; padding: 20px; border-radius: 8px; border-left: 5px solid #38bdf8; margin-bottom: 30px; }
        .order-box { background-color: #1e293b; padding: 30px; border-radius: 8px; }
        select, input { width: 100%; padding: 12px; border-radius: 5px; border: 1px solid #334155; background-color: #0f172a; color: white; margin-bottom: 20px; }
        .btn { background-color: #38bdf8; color: #0f172a; padding: 15px; border: none; width: 100%; font-weight: bold; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Phantom</h2>
        <a href="dashboard.html">📦 New Order</a>
        <a href="orders.html">📋 My Orders</a>
        <a href="#">💸 Add Funds</a>
    </div>
    <div class="main-content">
        <div class="balance-card">
            <h3>Account Balance</h3>
            <h1>₹ 0.00</h1>
        </div>
        <div class="order-box">
            <h2>New Social Order</h2>
            <label>Category</label>
            <select>
                <option>Instagram Followers (High Quality)</option>
                <option>Instagram Likes (Instant)</option>
                <option>Instagram Views (Reels)</option>
                <option>Telegram Members</option>
            </select>
            <label>Link</label>
            <input type="text" placeholder="Paste your Instagram link here...">
            <label>Quantity</label>
            <input type="number" placeholder="Enter quantity">
            <button class="btn">Place Order</button>
        </div>
    </div>
</body>
</html>
